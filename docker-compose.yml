services:
  fetcher:
    build:
      context: fetcher
      dockerfile: Dockerfile
    container_name: funding-cmma-fetcher
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  api:
    build:
      context: api
      dockerfile: Dockerfile
    container_name: funding-cmma-api
    depends_on:
      - fetcher
    volumes:
      - ./data:/app/data
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  nginx:
    image: docker.io/library/nginx:latest
    build:
      context: nginx
      dockerfile: Dockerfile
    container_name: funding-cmma-nginx
    depends_on:
      - api
    ports:
      - "8002:80"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

